<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Campus Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg:         #E8EDE2;
            --glass:      rgba(255, 255, 255, 0.78);
            --glass-hi:   rgba(255, 255, 255, 0.92);
            --glass-low:  rgba(255, 255, 255, 0.55);
            --surface:    rgba(255, 255, 255, 0.82);
            --surface-2:  rgba(245, 247, 241, 0.90);
            --surface-3:  rgba(235, 239, 229, 0.95);
            --border:     rgba(0, 0, 0, 0.07);
            --border-hi:  rgba(0, 0, 0, 0.13);
            --accent:     #C8F135;
            --accent-dim: rgba(200, 241, 53, 0.22);
            --accent-text:#5A7000;
            --text-1:     #111D00;
            --text-2:     #445230;
            --text-3:     #8A9E74;
            --danger:     #E53E3E;
            --warning:    #F59E0B;
            --safe:       #3DA01A;
            --radius-sm:  12px;
            --radius-md:  18px;
            --radius-lg:  26px;
            --radius-full: 999px;
            --sheet-peek: 88px;
            --sidebar-w:  340px;
            --blur:       blur(22px);
            --shadow-sm:  0 2px 12px rgba(0,0,0,0.07);
            --shadow-md:  0 6px 28px rgba(0,0,0,0.11);
            --shadow-lg:  0 16px 48px rgba(0,0,0,0.14);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text-1);
        }

        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .leaflet-tile {
            filter: brightness(1.06) saturate(0.72) hue-rotate(8deg);
        }

        .icon {
            font-family: 'Material Symbols Outlined';
            font-variation-settings: "FILL" 0, "wght" 500;
            display: inline-block;
            line-height: 1;
            user-select: none;
        }
        .icon-fill { font-variation-settings: "FILL" 1, "wght" 500; }
        .icon-sm  { font-size: 17px; }
        .icon-md  { font-size: 21px; }
        .icon-lg  { font-size: 26px; }

        .top-bar {
            position: fixed;
            top: 18px;
            left: 14px;
            right: 14px;
            z-index: 60;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-wrap {
            flex: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            height: 50px;
            background: var(--glass-hi);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1.5px solid var(--accent);
            border-radius: var(--radius-full);
            padding: 0 48px 0 48px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-1);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow-md);
        }

        .search-input::placeholder {
            color: var(--text-3);
            font-weight: 600;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(200,241,53,0.22), var(--shadow-md);
        }

        .search-icon-left {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-2);
            pointer-events: none;
        }

        .search-clear {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--surface-3);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-2);
            font-size: 13px;
        }

        .suggestions-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: var(--glass-hi);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border-hi);
            border-radius: var(--radius-md);
            overflow: hidden;
            z-index: 100;
            display: none;
            box-shadow: var(--shadow-lg);
        }
        .suggestions-dropdown.show { display: block; }

        .suggestion-item {
            padding: 13px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: rgba(200,241,53,0.12); }
        .suggestion-item:active { background: var(--accent-dim); }

        .sug-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-3);
            flex-shrink: 0;
        }

        .suggestion-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--text-1);
            flex: 1;
        }

        .suggestion-dist {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-text);
            font-family: 'DM Mono', monospace;
            background: var(--accent-dim);
            padding: 2px 8px;
            border-radius: var(--radius-full);
        }

        .map-controls {
            position: fixed;
            right: 16px;
            bottom: calc(var(--sheet-peek) + 24px);
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ctrl-btn {
            width: 46px;
            height: 46px;
            border-radius: var(--radius-sm);
            background: var(--glass-hi);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border-hi);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-2);
            box-shadow: var(--shadow-md);
            transition: background 0.15s, color 0.15s, transform 0.1s;
        }
        .ctrl-btn:hover  { background: var(--glass); color: var(--text-1); }
        .ctrl-btn:active { transform: scale(0.94); }

        .ctrl-btn.follow-active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--text-1);
            box-shadow: 0 0 0 3px rgba(200,241,53,0.35), var(--shadow-md);
        }
        .ctrl-btn.follow-active .icon { font-variation-settings: "FILL" 1; }

        .mode-pill {
            position: fixed;
            left: 16px;
            bottom: calc(var(--sheet-peek) + 24px);
            z-index: 50;
            height: 46px;
            padding: 0 18px;
            border-radius: var(--radius-full);
            background: var(--glass-hi);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border-hi);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: background 0.2s, transform 0.1s;
        }
        .mode-pill:hover  { background: var(--glass); }
        .mode-pill:active { transform: scale(0.96); }
        .mode-pill .icon  { color: var(--accent-text); }
        .mode-pill-label  {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: 0.01em;
        }

        .sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 55;
            background: var(--glass-hi);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-top: 1px solid var(--border-hi);
            border-radius: 26px 26px 0 0;
            transition: transform 0.36s cubic-bezier(0.32, 0.72, 0, 1);
            --full-h: 380px;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.10);
        }

        .sheet.collapsed {
            transform: translateY(calc(100% - var(--sheet-peek)));
        }
        .sheet.expanded {
            transform: translateY(0);
        }
        .sheet.inactive {
            opacity: 0.6;
            pointer-events: none;
            transform: translateY(calc(100% - var(--sheet-peek)));
        }

        .sheet-handle-row {
            display: flex;
            justify-content: center;
            padding: 12px 0 8px;
            cursor: pointer;
        }
        .sheet-handle {
            width: 38px;
            height: 4px;
            border-radius: 4px;
            background: var(--border-hi);
        }

        .compact-row {
            display: flex;
            align-items: center;
            padding: 0 20px 16px;
            gap: 12px;
            cursor: pointer;
        }
        .sheet.expanded .compact-row { display: none; }

        .compact-dest-text {
            flex: 1;
            font-size: 14px;
            font-weight: 800;
            color: var(--text-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .compact-badge {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-text);
            background: var(--accent-dim);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            border: 1px solid rgba(200,241,53,0.4);
        }

        .sheet-body {
            display: none;
            padding: 0 20px 20px;
        }
        .sheet.expanded .sheet-body { display: block; }

        .sheet-section-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 10px;
            margin-top: 20px;
        }

        .route-card {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 8px;
            box-shadow: var(--shadow-sm);
        }

        .route-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .route-dot.origin { background: var(--text-3); border: 2px solid var(--text-2); }
        .route-dot.dest   { background: var(--accent); border: 2px solid var(--accent-text); }

        .route-card-content { flex: 1; min-width: 0; }
        .route-card-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 3px;
        }
        .route-card-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .metrics-strip {
            display: flex;
            background: var(--accent-dim);
            border: 1.5px solid rgba(200,241,53,0.35);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-top: 8px;
        }

        .metric-cell {
            flex: 1;
            padding: 16px 0;
            text-align: center;
        }
        .metric-cell + .metric-cell {
            border-left: 1px solid rgba(200,241,53,0.3);
        }
        .metric-val {
            font-family: 'DM Mono', monospace;
            font-size: 24px;
            font-weight: 500;
            color: var(--text-1);
            line-height: 1;
        }
        .metric-lbl {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent-text);
            margin-top: 5px;
        }

        .actions-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-go {
            flex: 2;
            height: 54px;
            border-radius: var(--radius-full);
            background: var(--accent);
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: var(--text-1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            box-shadow: 0 4px 20px rgba(200,241,53,0.45);
            letter-spacing: 0.02em;
        }
        .btn-go:hover  { opacity: 0.9; }
        .btn-go:active { opacity: 0.8; transform: scale(0.97); }

        .btn-stop {
            flex: 1;
            height: 54px;
            border-radius: var(--radius-full);
            background: var(--surface-3);
            border: 1px solid var(--border-hi);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        .btn-stop:hover  { background: var(--surface-2); }
        .btn-stop:active { transform: scale(0.97); }
        
        .btn-stop {
            display: none;
        }
        
        .btn-stop.visible {
            display: flex;
        }

        .gps-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-top: 16px;
        }

        .gps-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--danger);
            flex-shrink: 0;
        }
        .gps-dot.live {
            background: var(--safe);
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        .gps-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            font-family: 'DM Mono', monospace;
        }

        .sheet-top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 2px;
        }
        .sheet-title-text {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: -0.01em;
        }
        .close-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface-3);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-2);
            transition: background 0.15s;
        }
        .close-btn:hover { background: var(--surface-2); }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 70;
            background: var(--glass-hi);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-top: 1px solid var(--border-hi);
            display: flex;
            padding: 8px 0 calc(env(safe-area-inset-bottom, 0px) + 6px);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.07);
        }

        .sheet.expanded ~ .bottom-nav,
        body.sheet-open .bottom-nav {
            opacity: 0;
            pointer-events: none;
        }

        .nav-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 0;
            transition: opacity 0.15s;
        }
        .nav-tab:active { opacity: 0.7; }
        .nav-tab-icon  { color: var(--text-3); transition: color 0.15s; }
        .nav-tab-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text-3);
            transition: color 0.15s;
        }
        .nav-tab.active .nav-tab-icon,
        .nav-tab.active .nav-tab-label {
            color: var(--accent-text);
        }

        .off-route-badge {
            position: fixed;
            bottom: calc(var(--sheet-peek) + 100px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--warning);
            color: #111D00;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 800;
            z-index: 80;
            display: none;
            box-shadow: var(--shadow-md);
            white-space: nowrap;
        }

        /* DESKTOP OVERRIDES */
        @media (min-width: 768px) {
            .sheet {
                top: 0;
                left: 0;
                bottom: 0;
                right: auto;
                width: var(--sidebar-w);
                border-radius: 0;
                border-top: none;
                border-right: 1px solid var(--border-hi);
                box-shadow: 4px 0 40px rgba(0,0,0,0.10);
                display: flex;
                flex-direction: column;
                transform: none !important;
                opacity: 1 !important;
                pointer-events: auto !important;
                overflow-y: auto;
                overflow-x: hidden;
                padding-bottom: 80px;
            }

            .sheet-handle-row,
            .compact-row { display: none !important; }
            
            .close-btn {
                display: none !important;
            }

            .sheet-body {
                display: block !important;
                flex: 1;
                padding: 0 20px 20px;
            }

            /* Brand at top with generous spacing */
            .sidebar-brand {
                display: flex !important;
                align-items: center;
                gap: 12px;
                padding: 28px 20px 28px 20px;
                margin-top: 0;
                margin-bottom: 0;
                border-bottom: 1px solid var(--border);
            }

            /* Search bar below brand with generous spacing */
            .top-bar {
                position: relative;
                top: 0;
                left: 0;
                right: 0;
                width: 100%;
                padding: 20px 20px 24px 20px;
                margin-top: 0;
                margin-bottom: 0;
                background: transparent;
                border-bottom: 1px solid var(--border);
            }

            .search-wrap {
                width: 100%;
            }

            .suggestions-dropdown {
                width: 100%;
            }

            .map-controls {
                left: auto;
                right: 20px;
                bottom: 32px;
            }

            .mode-pill {
                left: calc(var(--sidebar-w) + 20px);
                bottom: 32px;
            }

            .bottom-nav {
                top: auto;
                left: 0;
                right: auto;
                bottom: 0;
                width: var(--sidebar-w);
                border-top: 1px solid var(--border-hi);
                border-right: 1px solid var(--border-hi);
                background: var(--glass);
                backdrop-filter: var(--blur);
                -webkit-backdrop-filter: var(--blur);
                flex-direction: row;
                z-index: 200;
                opacity: 1 !important;
                pointer-events: auto !important;
                padding: 10px 0 calc(env(safe-area-inset-bottom, 0px) + 10px);
            }

            /* Reset sheet-top-row margin */
            .sheet-body > .sheet-top-row {
                margin-top: 0;
                padding-top: 20px;
            }
        }

        /* On mobile, hide sidebar brand */
        .sidebar-brand { display: none; }

        .brand-dot {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .brand-dot .icon {
            font-size: 22px;
            color: var(--text-1);
            font-variation-settings: "FILL" 1, "wght" 700;
        }
        .brand-name {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: -0.01em;
        }
        .brand-sub {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-3);
            margin-top: 2px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0 0;
        }

        .leaflet-control-zoom        { display: none !important; }
        .leaflet-control-attribution { display: none !important; }

        .suggestions-dropdown::-webkit-scrollbar       { width: 4px; }
        .suggestions-dropdown::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }

        .sheet::-webkit-scrollbar       { width: 3px; }
        .sheet::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }
    </style>
</head>

<body>
    <div id="map"></div>
    
    <div class="off-route-badge" id="offRouteBadge">⚠️ Off route • Rerouting...</div>

    <div class="top-bar">
        <div class="search-wrap">
            <span class="icon icon-sm search-icon-left">search</span>
            <input type="text" class="search-input" id="searchInput"
                   placeholder="Where to?" autocomplete="off" />
            <span class="search-clear" id="clearSearchBtn">
                <span class="icon" style="font-size:13px">close</span>
            </span>
            <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
        </div>
    </div>

    <div class="mode-pill" id="modeToggle">
        <span class="icon icon-sm" id="modeIcon">directions_walk</span>
        <span class="mode-pill-label" id="modeText">Walk</span>
    </div>

    <div class="map-controls">
        <div class="ctrl-btn" id="zoomInBtn"><span class="icon icon-md">add</span></div>
        <div class="ctrl-btn" id="zoomOutBtn"><span class="icon icon-md">remove</span></div>
        <div class="ctrl-btn" id="followMeBtn"><span class="icon icon-md">navigation</span></div>
    </div>

    <div class="sheet inactive" id="navSheet">
        <div class="sidebar-brand">
            <div class="brand-dot"><span class="icon">location_on</span></div>
            <div>
                <div class="brand-name">Campus Connect</div>
                <div class="brand-sub">University of Limpopo</div>
            </div>
        </div>

        <div class="sheet-handle-row" id="handleArea">
            <div class="sheet-handle"></div>
        </div>

        <div class="compact-row" id="compactInfo">
            <span class="icon icon-sm" id="compactMode" style="color:var(--text-3)">directions_walk</span>
            <span class="compact-dest-text" id="compactDest">Select destination</span>
            <span class="compact-badge" id="compactDistance">—</span>
        </div>

        <div class="sheet-body">
            <div class="sheet-top-row">
                <span class="sheet-title-text" id="sheetModeTitle">Campus Connect</span>
                <button class="close-btn" id="closeSheetBtn">
                    <span class="icon icon-sm">close</span>
                </button>
            </div>

            <div class="divider"></div>

            <div class="sheet-section-label">Route</div>

            <div class="route-card">
                <div class="route-dot origin"></div>
                <div class="route-card-content">
                    <div class="route-card-label">From</div>
                    <div class="route-card-value" id="departureLabel">Your location</div>
                </div>
            </div>

            <div class="route-card">
                <div class="route-dot dest"></div>
                <div class="route-card-content">
                    <div class="route-card-label">To</div>
                    <div class="route-card-value" id="destinationLabel">Select destination</div>
                </div>
            </div>

            <div class="metrics-strip">
                <div class="metric-cell">
                    <div class="metric-val" id="distanceVal">—</div>
                    <div class="metric-lbl">Distance</div>
                </div>
                <div class="metric-cell">
                    <div class="metric-val" id="timeVal">—</div>
                    <div class="metric-lbl">Est. time</div>
                </div>
            </div>

            <div class="actions-row">
                <button class="btn-go" id="startNavBtn">
                    <span class="icon icon-sm" id="sheetModeIcon">directions_walk</span>
                    Start
                </button>
                <button class="btn-stop" id="stopNavBtn">
                    <span class="icon icon-sm">stop</span>
                    Stop
                </button>
            </div>

            <div class="gps-row">
                <div class="gps-dot" id="gpsLed"></div>
                <span class="gps-label" id="gpsText">Waiting for location…</span>
            </div>
        </div>
    </div>

    <div class="bottom-nav" id="bottomNav">
        <button class="nav-tab">
            <span class="icon icon-sm nav-tab-icon">explore</span>
            <span class="nav-tab-label">Explore</span>
        </button>
        <button class="nav-tab active" id="navTabBtn">
            <span class="icon icon-sm nav-tab-icon">directions</span>
            <span class="nav-tab-label">Navigate</span>
        </button>
        <button class="nav-tab">
            <span class="icon icon-sm nav-tab-icon">bookmark_border</span>
            <span class="nav-tab-label">Saved</span>
        </button>
        <button class="nav-tab">
            <span class="icon icon-sm nav-tab-icon">person_outline</span>
            <span class="nav-tab-label">Account</span>
        </button>
    </div>

    <script>
        let map;
        let currentLocation = null;
        let currentDestination = null;
        let userMarker = null;
        let destMarker = null;
        let watchId = null;
        let isNavigating = false;
        let currentMode = "walk";
        let followMode = false;
        let routeLayer = null;
        let intersectionMarker = null;
        let dashedRouteLayer = null;
        
        let isFetchingRoute = false;
        let currentRouteRequestId = 0;
        let offRouteCounter = 0;
        let isOffRouteFlag = false;
        
        const statusDiv = document.getElementById('gpsText');
        const sheet = document.getElementById('navSheet');
        const searchInput = document.getElementById('searchInput');
        const suggestionsDropdown = document.getElementById('suggestionsDropdown');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const followBtn = document.getElementById('followMeBtn');
        const offRouteBadge = document.getElementById('offRouteBadge');
        const stopNavBtn = document.getElementById('stopNavBtn');

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const toRad = Math.PI / 180;
            const φ1 = lat1 * toRad, φ2 = lat2 * toRad;
            const Δφ = (lat2 - lat1) * toRad;
            const Δλ = (lon2 - lon1) * toRad;
            const a = Math.sin(Δφ / 2) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function clearRouteLayer() {
            if (routeLayer) {
                map.removeLayer(routeLayer);
                routeLayer = null;
            }
            if (intersectionMarker) {
                map.removeLayer(intersectionMarker);
                intersectionMarker = null;
            }
            if (dashedRouteLayer) {
                map.removeLayer(dashedRouteLayer);
                dashedRouteLayer = null;
            }
        }

        function updateMetrics(distance) {
            if (!distance && distance !== 0) return;
            const time = currentMode === "walk" ? distance / (1.4 * 60) : distance / (8 * 60);
            const distText = distance < 1000 ? `${Math.round(distance)}m` : `${(distance / 1000).toFixed(1)}km`;
            document.getElementById('distanceVal').innerHTML = distText;
            document.getElementById('timeVal').innerHTML = `${Math.ceil(time)} min`;
            document.getElementById('compactDistance').innerHTML = distText;
        }

        function checkOffRoute() {
            if (!routeLayer || !currentLocation || !isNavigating) return false;
            
            const routePath = routeLayer.getLatLngs();
            if (!routePath || routePath.length === 0) return false;
            
            let minDistance = Infinity;
            for (let i = 0; i < routePath.length; i++) {
                const point = routePath[i];
                const dist = haversine(
                    currentLocation.lat, currentLocation.lng,
                    point.lat, point.lng
                );
                minDistance = Math.min(minDistance, dist);
            }
            
            return minDistance > 30;
        }

        function drawDashedLineToRoute() {
            if (!routeLayer || !currentLocation || !isNavigating) return;
            
            if (dashedRouteLayer) {
                map.removeLayer(dashedRouteLayer);
                dashedRouteLayer = null;
            }
            
            const routePath = routeLayer.getLatLngs();
            if (!routePath || routePath.length === 0) return;
            
            let closestPoint = null;
            let minDistance = Infinity;
            for (let i = 0; i < routePath.length; i++) {
                const point = routePath[i];
                const dist = haversine(
                    currentLocation.lat, currentLocation.lng,
                    point.lat, point.lng
                );
                if (dist < minDistance) {
                    minDistance = dist;
                    closestPoint = point;
                }
            }
            
            if (closestPoint && minDistance > 5) {
                dashedRouteLayer = L.polyline(
                    [[currentLocation.lat, currentLocation.lng], [closestPoint.lat, closestPoint.lng]],
                    { color: "#F59E0B", weight: 3, opacity: 0.8, dashArray: "8, 8", lineCap: 'round' }
                ).addTo(map);
            }
        }

        function rerouteFromCurrentPosition() {
            if (!currentLocation || !currentDestination || !isNavigating) return;
            if (isFetchingRoute) return;
            
            offRouteBadge.style.display = 'block';
            setTimeout(() => {
                offRouteBadge.style.display = 'none';
            }, 3000);
            
            fetchRoute(true, currentLocation);
        }

        function fetchRoute(forceReroute = false, startPoint = null) {
            if (!currentDestination) return;
            
            const routeStart = startPoint || currentLocation;
            if (!routeStart) return;
            
            if (isFetchingRoute) return;
            
            isFetchingRoute = true;
            
            const thisRequestId = ++currentRouteRequestId;
            
            const url = `/api/route?startLat=${routeStart.lat}&startLng=${routeStart.lng}&endLat=${currentDestination.lat}&endLng=${currentDestination.lng}&mode=${currentMode}`;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (thisRequestId !== currentRouteRequestId) {
                        isFetchingRoute = false;
                        return;
                    }
                    
                    if (data.path && data.path.length > 0) {
                        if (routeLayer) {
                            map.removeLayer(routeLayer);
                            routeLayer = null;
                        }
                        if (dashedRouteLayer) {
                            map.removeLayer(dashedRouteLayer);
                            dashedRouteLayer = null;
                        }
                        
                        const latlngs = data.path.map(p => [p[0], p[1]]);
                        
                        routeLayer = L.polyline(latlngs, {
                            color: forceReroute ? "#F59E0B" : "#C8F135",
                            weight: 5,
                            opacity: 0.95,
                            lineCap: 'round'
                        }).addTo(map);
                        
                        if (data.intersectionPoint) {
                            if (intersectionMarker) {
                                map.removeLayer(intersectionMarker);
                            }
                            intersectionMarker = L.circleMarker(
                                [data.intersectionPoint[0], data.intersectionPoint[1]],
                                { radius: 8, fillColor: "#C8F135", color: "#111D00", weight: 2, fillOpacity: 1 }
                            ).addTo(map);
                        }
                        
                        updateMetrics(data.distance);
                        
                        if (forceReroute) {
                            setTimeout(() => {
                                if (routeLayer) {
                                    routeLayer.setStyle({ color: "#C8F135" });
                                }
                                offRouteCounter = 0;
                                isOffRouteFlag = false;
                            }, 5000);
                        }
                    }
                    isFetchingRoute = false;
                })
                .catch(err => {
                    console.error("Route error:", err);
                    isFetchingRoute = false;
                });
        }

        function setDestination(dest) {
            clearRouteLayer();
            offRouteCounter = 0;
            isOffRouteFlag = false;
            
            currentDestination = dest;
            document.getElementById('destinationLabel').innerHTML = dest.name;
            document.getElementById('compactDest').innerHTML = dest.name;
            
            if (destMarker) map.removeLayer(destMarker);
            const destIcon = L.divIcon({
                html: `<div style="background:#C8F135; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 5px rgba(200,241,53,0.25), 0 2px 12px rgba(0,0,0,0.25); border:2px solid #111D00;"><span class="icon" style="color:#111D00; font-size:16px; font-family:'Material Symbols Outlined'; font-variation-settings:'FILL' 1;">location_on</span></div>`,
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            });
            destMarker = L.marker([dest.lat, dest.lng], { icon: destIcon }).addTo(map);
            
            if (currentLocation) fetchRoute(false, currentLocation);
            sheet.classList.remove('inactive');
            sheet.classList.add('expanded');
        }

        function clearDestination() {
            clearRouteLayer();
            offRouteCounter = 0;
            isOffRouteFlag = false;
            
            currentDestination = null;
            
            if (destMarker) { map.removeLayer(destMarker); destMarker = null; }
            
            document.getElementById('destinationLabel').innerHTML = "Select destination";
            document.getElementById('compactDest').innerHTML = "Select destination";
            document.getElementById('distanceVal').innerHTML = "—";
            document.getElementById('timeVal').innerHTML = "—";
            document.getElementById('compactDistance').innerHTML = "—";
            sheet.classList.add('inactive');
        }

        function startNavigation() {
            if (!currentLocation) return;
            if (!currentDestination) { 
                sheet.classList.add('expanded'); 
                searchInput.focus(); 
                return; 
            }
            isNavigating = true;
            offRouteCounter = 0;
            isOffRouteFlag = false;
            
            stopNavBtn.classList.add('visible');
            
            fetchRoute(false, currentLocation);
            map.setView([currentLocation.lat, currentLocation.lng], 18);
            sheet.classList.remove('expanded');
            sheet.classList.add('collapsed');
        }

        function stopNavigation() { 
            isNavigating = false; 
            setFollowMode(false); 
            clearDestination();
            offRouteBadge.style.display = 'none';
            if (dashedRouteLayer) {
                map.removeLayer(dashedRouteLayer);
                dashedRouteLayer = null;
            }
            stopNavBtn.classList.remove('visible');
        }
        
        function setFollowMode(enabled) {
            followMode = enabled;
            if (followMode) {
                followBtn.classList.add('follow-active');
                if (currentLocation) map.setView([currentLocation.lat, currentLocation.lng], map.getZoom());
            } else {
                followBtn.classList.remove('follow-active');
            }
        }
        
        function toggleFollowMode() { setFollowMode(!followMode); }

        const campusBuildings = [
            { lat: -23.8865878, lng: 29.7410106, name: "Maths Building" },
            { lat: -23.8870926, lng: 29.7402418, name: "Digital Innovation Lab" },
            { lat: -23.8878509, lng: 29.7409511, name: "TA Hall" },
            { lat: -23.8874262, lng: 29.7397976, name: "Tiro Hall" },
            { lat: -23.8882049, lng: 29.7402466, name: "School of Law" },
            { lat: -23.8879335, lng: 29.7395395, name: "Library" },
            { lat: -23.8885565, lng: 29.7386208, name: "S Block" },
            { lat: -23.8868692, lng: 29.7376558, name: "SRC Chambers" },
            { lat: -23.8877729, lng: 29.7370029, name: "Tsalas Cafe" },
            { lat: -23.8868133, lng: 29.7363624, name: "Mashobane Res" }
        ];

        function getSuggestions(query) {
            if (!query) return [];
            const q = query.toLowerCase();
            return campusBuildings.filter(b => b.name.toLowerCase().includes(q)).map(b => ({
                ...b,
                distance: currentLocation ? haversine(currentLocation.lat, currentLocation.lng, b.lat, b.lng) : null
            }));
        }

        function showSuggestions(suggestions) {
            if (suggestions.length === 0) { suggestionsDropdown.classList.remove('show'); return; }
            suggestionsDropdown.innerHTML = suggestions.map(b => `
                <div class="suggestion-item" data-lat="${b.lat}" data-lng="${b.lng}" data-name="${b.name.replace(/'/g, "\\'")}">
                    <div class="sug-dot"></div>
                    <div class="suggestion-name">${b.name}</div>
                    ${b.distance ? `<span class="suggestion-dist">${b.distance < 1000 ? Math.round(b.distance) + 'm' : (b.distance/1000).toFixed(1) + 'km'}</span>` : ''}
                </div>`).join('');
            suggestionsDropdown.classList.add('show');
            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', () => {
                    setDestination({ lat: parseFloat(item.dataset.lat), lng: parseFloat(item.dataset.lng), name: item.dataset.name });
                    searchInput.value = item.dataset.name;
                    suggestionsDropdown.classList.remove('show');
                });
            });
        }

        function checkNetworkStatus() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    if (data.loaded) {
                        statusDiv.innerHTML = `GPS active · ${data.nodeCount} nodes ready`;
                        if (currentLocation && currentDestination && !isNavigating) fetchRoute(false, currentLocation);
                    } else {
                        statusDiv.innerHTML = "Waiting for network…";
                        setTimeout(checkNetworkStatus, 2000);
                    }
                })
                .catch(() => {
                    statusDiv.innerHTML = "Connecting to server…";
                    setTimeout(checkNetworkStatus, 3000);
                });
        }

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false })
                   .setView([-23.88674, 29.73942], 18);
            L.tileLayer('https://mt0.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 19 }).addTo(map);
        }

        function startGPS() {
            if (!navigator.geolocation) { statusDiv.innerHTML = "GPS not supported"; return; }
            const led = document.getElementById('gpsLed');
            let lastRerouteTime = 0;
            
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const newLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    currentLocation = newLoc;
                    document.getElementById('departureLabel').innerHTML = `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
                    led.classList.add('live');
                    
                    if (userMarker) {
                        userMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
                    } else {
                        userMarker = L.marker([pos.coords.latitude, pos.coords.longitude], {
                            icon: L.divIcon({
                                html: `<div style="background:#C8F135; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 5px rgba(200,241,53,0.3); border:2px solid #111D00;"><span class="icon" style="color:#111D00; font-size:15px; font-family:'Material Symbols Outlined'; font-variation-settings:'FILL' 1;">${currentMode === "walk" ? "directions_walk" : "directions_car"}</span></div>`,
                                iconSize: [32, 32],
                                iconAnchor: [16, 16]
                            })
                        }).addTo(map);
                    }
                    
                    if (followMode && currentLocation) {
                        map.setView([currentLocation.lat, currentLocation.lng], map.getZoom());
                    }
                    
                    if (currentDestination && isNavigating) {
                        const remainingDist = haversine(
                            currentLocation.lat, currentLocation.lng,
                            currentDestination.lat, currentDestination.lng
                        );
                        updateMetrics(remainingDist);
                        
                        if (remainingDist < 20) {
                            isNavigating = false;
                            setFollowMode(false);
                            stopNavBtn.classList.remove('visible');
                            statusDiv.innerHTML = "Arrived!";
                            if (window.navigator.vibrate) window.navigator.vibrate(200);
                            sheet.classList.add('expanded');
                            offRouteBadge.style.display = 'none';
                            if (dashedRouteLayer) {
                                map.removeLayer(dashedRouteLayer);
                                dashedRouteLayer = null;
                            }
                            return;
                        }
                        
                        const isOff = checkOffRoute();
                        const now = Date.now();
                        
                        if (isOff) {
                            offRouteCounter++;
                            drawDashedLineToRoute();
                            
                            if (offRouteCounter >= 3 && (now - lastRerouteTime) > 10000) {
                                lastRerouteTime = now;
                                rerouteFromCurrentPosition();
                                offRouteCounter = 0;
                            } else if (!isOffRouteFlag) {
                                if (routeLayer) {
                                    routeLayer.setStyle({ color: "#F59E0B" });
                                }
                                isOffRouteFlag = true;
                            }
                        } else {
                            if (offRouteCounter > 0) offRouteCounter--;
                            if (dashedRouteLayer) {
                                map.removeLayer(dashedRouteLayer);
                                dashedRouteLayer = null;
                            }
                            if (isOffRouteFlag) {
                                if (routeLayer) {
                                    routeLayer.setStyle({ color: "#C8F135" });
                                }
                                isOffRouteFlag = false;
                            }
                        }
                    } else if (currentDestination && !isNavigating) {
                        const dist = haversine(
                            currentLocation.lat, currentLocation.lng,
                            currentDestination.lat, currentDestination.lng
                        );
                        updateMetrics(dist);
                    }
                },
                (error) => {
                    led.classList.remove('live');
                    statusDiv.innerHTML = error.code === 1 ? "Location permission denied" : "GPS error";
                },
                { enableHighAccuracy: true, maximumAge: 6000, timeout: 10000 }
            );
        }

        document.getElementById('modeToggle').addEventListener('click', () => {
            currentMode = currentMode === "walk" ? "drive" : "walk";
            const isWalk = currentMode === "walk";
            document.getElementById('modeIcon').innerHTML = isWalk ? 'directions_walk' : 'directions_car';
            document.getElementById('modeText').innerHTML = isWalk ? 'Walk' : 'Drive';
            document.getElementById('sheetModeIcon').innerHTML = isWalk ? 'directions_walk' : 'directions_car';
            document.getElementById('compactMode').innerHTML = `<span class="icon icon-sm">${isWalk ? 'directions_walk' : 'directions_car'}</span>`;
            if (currentLocation && currentDestination) fetchRoute(false, currentLocation);
        });

        document.getElementById('zoomInBtn').addEventListener('click', () => map.zoomIn());
        document.getElementById('zoomOutBtn').addEventListener('click', () => map.zoomOut());
        followBtn.addEventListener('click', toggleFollowMode);
        document.getElementById('startNavBtn').addEventListener('click', startNavigation);
        document.getElementById('stopNavBtn').addEventListener('click', stopNavigation);
        document.getElementById('navTabBtn').addEventListener('click', () => {
            if (!sheet.classList.contains('inactive')) {
                sheet.classList.remove('collapsed');
                sheet.classList.add('expanded');
            }
        });
        document.getElementById('handleArea').addEventListener('click', () => {
            if (sheet.classList.contains('inactive')) return;
            if (sheet.classList.contains('expanded')) {
                sheet.classList.remove('expanded');
                sheet.classList.add('collapsed');
            } else {
                sheet.classList.remove('collapsed');
                sheet.classList.add('expanded');
            }
        });
        document.getElementById('compactInfo').addEventListener('click', () => {
            if (!sheet.classList.contains('inactive')) {
                sheet.classList.remove('collapsed');
                sheet.classList.add('expanded');
            }
        });
        document.getElementById('closeSheetBtn').addEventListener('click', () => {
            sheet.classList.remove('expanded');
            sheet.classList.add('collapsed');
        });

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearSearchBtn.style.display = e.target.value ? 'flex' : 'none';
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                showSuggestions(getSuggestions(e.target.value.toLowerCase()));
            }, 150);
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearSearchBtn.style.display = 'none';
            suggestionsDropdown.classList.remove('show');
            searchInput.focus();
        });

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !suggestionsDropdown.contains(e.target)) {
                suggestionsDropdown.classList.remove('show');
            }
        });

        window.addEventListener('load', () => {
            initMap();
            startGPS();
            checkNetworkStatus();
        });

        window.addEventListener('beforeunload', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
        });
    </script>
</body>
</html>
