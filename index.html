<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Campus Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #FAF2E5;
            --surface: #FCF6EE;
            --surface-2: #F2E8D6;
            --surface-3: #D9C9AD;
            --border: #1E1E1E;
            --border-hi: #2E2E2E;
            --accent: #F2C94C;
            --accent-text: #2D2202;
            --accent-dim: rgba(242,201,76,0.20);
            --text-1: #121212;
            --text-2: #3B3B3B;
            --text-3: #666666;
            --danger: #C02727;
            --warning: #F2A30D;
            --safe: #2D7D39;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-full: 999px;
            --sheet-peek: 88px;
            --sidebar-w: 360px;
            --blur: blur(18px);
            --shadow-sm: 8px 4px 0 rgba(0,0,0,0.08);
            --shadow-md: 12px 6px 0 rgba(0,0,0,0.12);
            --shadow-lg: 22px 10px 0 rgba(0,0,0,0.16);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--text-1);
        }

        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .leaflet-tile {
            filter: brightness(1.06) saturate(0.72) hue-rotate(8deg);
        }

        .icon {
            font-family: 'Material Symbols Outlined';
            font-variation-settings: "FILL" 0, "wght" 500;
            display: inline-block;
            line-height: 1;
            user-select: none;
        }
        .icon-fill { font-variation-settings: "FILL" 1, "wght" 500; }
        .icon-sm  { font-size: 17px; }
        .icon-md  { font-size: 21px; }
        .icon-lg  { font-size: 26px; }

        .top-bar {
            position: fixed;
            top: 18px;
            left: 14px;
            right: 14px;
            z-index: 60;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-wrap {
            flex: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            height: 52px;
            background: var(--surface);
            border: 2px solid var(--border-hi);
            border-radius: var(--radius-sm);
            padding: 0 46px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-1);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .search-input::placeholder {
            color: var(--text-3);
            font-weight: 600;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(242,201,76,0.15), var(--shadow-sm);
        }

        .search-icon-left {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-2);
            pointer-events: none;
        }

        .search-clear {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--surface-3);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-2);
            font-size: 13px;
        }

        .suggestions-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 2px solid var(--border-hi);
            border-radius: var(--radius-md);
            overflow: hidden;
            z-index: 100;
            display: none;
            box-shadow: var(--shadow-lg);
        }
        .suggestions-dropdown.show { display: block; }

        .suggestion-item {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--surface-3);
            transition: background 0.15s;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: var(--surface-2); }
        .suggestion-item:active { background: var(--accent-dim); }

        .sug-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-3);
            flex-shrink: 0;
        }

        .suggestion-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--text-1);
            flex: 1;
        }

        .suggestion-dist {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-text);
            font-family: 'DM Mono', monospace;
            background: var(--accent-dim);
            padding: 2px 8px;
            border-radius: var(--radius-full);
        }

        .map-controls {
            position: fixed;
            right: 16px;
            bottom: calc(var(--sheet-peek) + 24px);
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ctrl-btn {
            width: 46px;
            height: 46px;
            border-radius: 8px;
            background: var(--surface);
            border: 2px solid var(--border-hi);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-2);
            box-shadow: var(--shadow-sm);
            transition: background 0.15s, color 0.15s, transform 0.1s, box-shadow 0.1s;
        }
        .ctrl-btn:hover  { background: var(--surface-2); color: var(--text-1); }
        .ctrl-btn:active { transform: translateY(1px); box-shadow: 4px 4px 0 rgba(0,0,0,0.08); }

        .ctrl-btn.follow-active {
            background: var(--accent);
            border-color: var(--accent-text);
            color: var(--text-1);
            box-shadow: var(--shadow-md);
        }
        .ctrl-btn.follow-active .icon { font-variation-settings: "FILL" 1; }

        .mode-pill {
            position: fixed;
            left: 16px;
            bottom: calc(var(--sheet-peek) + 24px);
            z-index: 50;
            height: 46px;
            padding: 0 18px;
            border-radius: 10px;
            background: var(--surface);
            border: 2px solid var(--border-hi);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: background 0.2s, transform 0.1s, box-shadow 0.1s;
        }
        .mode-pill:hover  { background: var(--surface-2); }
        .mode-pill:active { transform: translateY(1px); box-shadow: 4px 4px 0 rgba(0,0,0,0.08); }
        .mode-pill .icon  { color: var(--accent-text); }
        .mode-pill-label  {
            font-size: 13px;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: 0.01em;
        }

        .sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 55;
            background: var(--surface);
            border-top: 4px solid var(--border-hi);
            border-radius: 0;
            transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
            box-shadow: 0 -18px 0 rgba(0,0,0,0.08);
        }

        .sheet.collapsed {
            transform: translateY(calc(100% - var(--sheet-peek)));
        }
        .sheet.expanded {
            transform: translateY(0);
        }
        .sheet.inactive {
            opacity: 0.6;
            pointer-events: none;
            transform: translateY(calc(100% - var(--sheet-peek)));
        }

        .sheet-handle-row {
            display: flex;
            justify-content: center;
            padding: 12px 0 8px;
            cursor: pointer;
        }
        .sheet-handle {
            width: 38px;
            height: 4px;
            border-radius: 4px;
            background: var(--border-hi);
        }

        .compact-row {
            display: flex;
            align-items: center;
            padding: 0 20px 16px;
            gap: 12px;
            cursor: pointer;
        }
        .sheet.expanded .compact-row { display: none; }

        .compact-dest-text {
            flex: 1;
            font-size: 14px;
            font-weight: 800;
            color: var(--text-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .compact-badge {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-text);
            background: var(--accent-dim);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            border: 1px solid rgba(200,241,53,0.4);
        }

        .sheet-body {
            display: none;
            padding: 0 20px 32px;
        }
        .sheet.expanded .sheet-body { display: block; }

        .sheet-section-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 10px;
            margin-top: 20px;
        }

        .route-card {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 8px;
            box-shadow: var(--shadow-sm);
        }

        .route-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .route-dot.origin { background: var(--text-3); border: 2px solid var(--text-2); }
        .route-dot.dest   { background: var(--accent); border: 2px solid var(--accent-text); }

        .route-card-content { flex: 1; min-width: 0; }
        .route-card-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 3px;
        }
        .route-card-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .metrics-strip {
            display: flex;
            background: var(--accent-dim);
            border: 1.5px solid rgba(200,241,53,0.35);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-top: 8px;
        }

        .metric-cell {
            flex: 1;
            padding: 16px 0;
            text-align: center;
        }
        .metric-cell + .metric-cell {
            border-left: 1px solid rgba(200,241,53,0.3);
        }
        .metric-val {
            font-family: 'DM Mono', monospace;
            font-size: 24px;
            font-weight: 500;
            color: var(--text-1);
            line-height: 1;
        }
        .metric-lbl {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent-text);
            margin-top: 5px;
        }

        .actions-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-go {
            flex: 2;
            height: 54px;
            border-radius: var(--radius-sm);
            background: var(--accent);
            border: 2px solid var(--accent-text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: var(--text-1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s, box-shadow 0.1s;
            box-shadow: var(--shadow-sm);
            letter-spacing: 0.02em;
        }
        .btn-go:hover  { opacity: 0.95; }
        .btn-go:active { transform: translateY(1px); box-shadow: 4px 4px 0 rgba(0,0,0,0.08); }

        .btn-stop {
            flex: 1;
            height: 54px;
            border-radius: var(--radius-sm);
            background: var(--surface-3);
            border: 2px solid var(--border-hi);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s, box-shadow 0.1s;
            box-shadow: var(--shadow-sm);
        }
        .btn-stop:hover  { background: var(--surface-2); }
        .btn-stop:active { transform: translateY(1px); box-shadow: 4px 4px 0 rgba(0,0,0,0.08); }
        
        /* Stop button hidden by default */
        .btn-stop {
            display: none;
        }
        
        /* Show stop button only when navigating */
        .btn-stop.visible {
            display: flex;
        }

        .gps-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-top: 16px;
        }

        .gps-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--danger);
            flex-shrink: 0;
        }
        .gps-dot.live {
            background: var(--safe);
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        .gps-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            font-family: 'DM Mono', monospace;
        }

        .sheet-top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 2px;
        }
        .sheet-title-text {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-2);
        }
        .close-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface-3);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-2);
            transition: background 0.15s;
        }
        .close-btn:hover { background: var(--surface-2); }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 70;
            background: var(--surface);
            border-top: 2px solid var(--border-hi);
            display: flex;
            padding: 8px 0 calc(env(safe-area-inset-bottom, 0px) + 6px);
            box-shadow: 0 -18px 0 rgba(0,0,0,0.08);
        }

        .sheet.expanded ~ .bottom-nav,
        body.sheet-open .bottom-nav {
            opacity: 0;
            pointer-events: none;
        }

        .nav-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: var(--surface-2);
            border: 2px solid var(--border-hi);
            border-radius: 8px;
            cursor: pointer;
            padding: 10px 0;
            margin: 0 4px;
            transition: opacity 0.15s, background 0.15s;
        }
        .nav-tab:active { opacity: 0.7; }
        .nav-tab-icon  { color: var(--text-3); transition: color 0.15s; }
        .nav-tab-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text-3);
            transition: color 0.15s;
        }
        .nav-tab.active .nav-tab-icon,
        .nav-tab.active .nav-tab-label {
            color: var(--accent-text);
        }

        .off-route-badge {
            position: fixed;
            bottom: calc(var(--sheet-peek) + 100px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--warning);
            color: #111D00;
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 800;
            z-index: 80;
            display: none;
            box-shadow: var(--shadow-md);
            white-space: nowrap;
        }

        /* DESKTOP OVERRIDES - KEPT EXACTLY AS BEFORE */
        @media (min-width: 768px) {
            .sheet {
                top: 0;
                left: 0;
                bottom: 0;
                right: auto;
                width: var(--sidebar-w);
                border-radius: 0;
                border-top: none;
                border-right: 1px solid var(--border-hi);
                box-shadow: 4px 0 40px rgba(0,0,0,0.10);
                display: flex;
                flex-direction: column;
                transform: none !important;
                opacity: 1 !important;
                pointer-events: auto !important;
                overflow-y: auto;
                overflow-x: hidden;
                padding-bottom: 80px;
            }

            .sheet-handle-row,
            .compact-row { display: none !important; }

            .sheet-body {
                display: block !important;
                flex: 1;
                padding: 0 20px 20px;
            }

            .top-bar {
                position: absolute;
                top: 20px;
                left: 20px;
                right: 20px;
                width: calc(var(--sidebar-w) - 40px);
                z-index: 200;
            }

            .suggestions-dropdown {
                width: 100%;
            }

            .map-controls {
                left: auto;
                right: 20px;
                bottom: 32px;
            }

            .mode-pill {
                left: calc(var(--sidebar-w) + 20px);
                bottom: 32px;
            }

            .bottom-nav {
                top: auto;
                left: 0;
                right: auto;
                bottom: 0;
                width: var(--sidebar-w);
                border-top: 1px solid var(--border-hi);
                border-right: 1px solid var(--border-hi);
                background: var(--glass);
                backdrop-filter: var(--blur);
                -webkit-backdrop-filter: var(--blur);
                flex-direction: row;
                z-index: 200;
                opacity: 1 !important;
                pointer-events: auto !important;
                padding: 10px 0 calc(env(safe-area-inset-bottom, 0px) + 10px);
            }

            .sheet-body > .sheet-top-row {
                margin-top: 90px;
            }

            .sidebar-brand {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 24px 20px 0;
                margin-top: 90px;
            }
            
            /* Hide close button on desktop */
            .close-btn {
                display: none !important;
            }
        }

        .sidebar-brand { display: none; }

        .brand-dot {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .brand-dot .icon {
            font-size: 14px;
            color: var(--text-1);
            font-variation-settings: "FILL" 1, "wght" 700;
        }
        .brand-name {
            font-size: 15px;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: -0.01em;
        }
        .brand-sub {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0 0;
        }

        .leaflet-control-zoom        { display: none !important; }
        .leaflet-control-attribution { display: none !important; }

        .suggestions-dropdown::-webkit-scrollbar       { width: 4px; }
        .suggestions-dropdown::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }

        .sheet::-webkit-scrollbar       { width: 3px; }
        .sheet::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }
    </style>
</head>

<body>
    <div id="map"></div>
    
    <div class="off-route-badge" id="offRouteBadge">⚠️ Off route • Rerouting...</div>

    <div class="top-bar">
        <div class="search-wrap">
            <span class="icon icon-sm search-icon-left">search</span>
            <input type="text" class="search-input" id="searchInput"
                   placeholder="Where to?" autocomplete="off" />
            <span class="search-clear" id="clearSearchBtn">
                <span class="icon" style="font-size:13px">close</span>
            </span>
            <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
        </div>
    </div>

    <div class="mode-pill" id="modeToggle">
        <span class="icon icon-sm" id="modeIcon">directions_walk</span>
        <span class="mode-pill-label" id="modeText">Walk</span>
    </div>

    <div class="map-controls">
        <div class="ctrl-btn" id="zoomInBtn"><span class="icon icon-md">add</span></div>
        <div class="ctrl-btn" id="zoomOutBtn"><span class="icon icon-md">remove</span></div>
        <div class="ctrl-btn" id="followMeBtn"><span class="icon icon-md">navigation</span></div>
    </div>

    <div class="sheet inactive" id="navSheet">
        <div class="sidebar-brand">
            <div class="brand-dot"><span class="icon">location_on</span></div>
            <div>
                <div class="brand-name">Campus Connect</div>
                <div class="brand-sub">University of Limpopo</div>
            </div>
        </div>

        <div class="sheet-handle-row" id="handleArea">
            <div class="sheet-handle"></div>
        </div>

        <div class="compact-row" id="compactInfo">
            <span class="icon icon-sm" id="compactMode" style="color:var(--text-3)">directions_walk</span>
            <span class="compact-dest-text" id="compactDest">Select destination</span>
            <span class="compact-badge" id="compactDistance">—</span>
        </div>

        <div class="sheet-body">
            <div class="sheet-top-row">
                <span class="sheet-title-text" id="sheetModeTitle">Campus Connect</span>
                <button class="close-btn" id="closeSheetBtn">
                    <span class="icon icon-sm">close</span>
                </button>
            </div>

            <div class="divider"></div>

            <div class="sheet-section-label">Route</div>

            <div class="route-card">
                <div class="route-dot origin"></div>
                <div class="route-card-content">
                    <div class="route-card-label">From</div>
                    <div class="route-card-value" id="departureLabel">Your location</div>
                </div>
            </div>

            <div class="route-card">
                <div class="route-dot dest"></div>
                <div class="route-card-content">
                    <div class="route-card-label">To</div>
                    <div class="route-card-value" id="destinationLabel">Select destination</div>
                </div>
            </div>

            <div class="metrics-strip">
                <div class="metric-cell">
                    <div class="metric-val" id="distanceVal">—</div>
                    <div class="metric-lbl">Distance</div>
                </div>
                <div class="metric-cell">
                    <div class="metric-val" id="timeVal">—</div>
                    <div class="metric-lbl">Est. time</div>
                </div>
            </div>

            <div class="actions-row">
                <button class="btn-go" id="startNavBtn">
                    <span class="icon icon-sm" id="sheetModeIcon">directions_walk</span>
                    Start
                </button>
                <button class="btn-stop" id="stopNavBtn">
                    <span class="icon icon-sm">stop</span>
                    Stop
                </button>
            </div>

            <div class="gps-row">
                <div class="gps-dot" id="gpsLed"></div>
                <span class="gps-label" id="gpsText">Waiting for location…</span>
            </div>
        </div>
    </div>

    <div class="bottom-nav" id="bottomNav">
        <button class="nav-tab">
            <span class="icon icon-sm nav-tab-icon">explore</span>
            <span class="nav-tab-label">Explore</span>
        </button>
        <button class="nav-tab active" id="navTabBtn">
            <span class="icon icon-sm nav-tab-icon">directions</span>
            <span class="nav-tab-label">Navigate</span>
        </button>
        <button class="nav-tab">
            <span class="icon icon-sm nav-tab-icon">bookmark_border</span>
            <span class="nav-tab-label">Saved</span>
        </button>
        <button class="nav-tab">
            <span class="icon icon-sm nav-tab-icon">person_outline</span>
            <span class="nav-tab-label">Account</span>
        </button>
    </div>

</body>
