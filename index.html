<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Campus Connect • Stable Navigation</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #0A0A0C; --surface: #141417; --surface-2: #1C1C21; --surface-3: #242429;
            --border: rgba(255,255,255,0.07); --border-hi: rgba(255,255,255,0.14);
            --accent: #C8F135; --accent-dim: rgba(200,241,53,0.12);
            --text-1: #F0F0F5; --text-2: #8A8A9A; --text-3: #5A5A6A;
            --danger: #EF4444; --safe: #C8F135;
            --radius-sm: 12px; --radius-md: 18px; --radius-lg: 26px; --radius-full: 999px;
            --sheet-peek: 88px;
        }
        html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text-1); }
        #map { position: absolute; inset: 0; z-index: 1; }
        .leaflet-tile { filter: brightness(0.72) saturate(0.6); }
        .icon { font-family: 'Material Symbols Outlined'; font-variation-settings: "FILL" 0, "wght" 400; display: inline-block; line-height: 1; user-select: none; }
        .icon-sm { font-size: 17px; }
        .icon-md { font-size: 21px; }
        .top-bar { position: fixed; top: 20px; left: 14px; right: 14px; z-index: 60; display: flex; gap: 10px; }
        .search-wrap { flex: 1; position: relative; }
        .search-input { width: 100%; height: 48px; background: var(--surface); border: 1px solid var(--accent); border-radius: var(--radius-full); padding: 0 44px 0 46px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--text-1); outline: none; }
        .search-input::placeholder { color: var(--text-3); }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,241,53,0.08); }
        .search-icon-left { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-2); pointer-events: none; }
        .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; border-radius: 50%; background: var(--surface-3); display: none; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); font-size: 13px; }
        .suggestions-dropdown { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border-hi); border-radius: var(--radius-md); overflow: hidden; z-index: 100; display: none; box-shadow: 0 16px 40px rgba(0,0,0,0.6); max-height: 300px; overflow-y: auto; }
        .suggestions-dropdown.show { display: block; }
        .suggestion-item { padding: 13px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
        .suggestion-item:hover { background: var(--surface-2); }
        .suggestion-item:active { background: var(--surface-3); }
        .suggestion-item:last-child { border-bottom: none; }
        .sug-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .suggestion-name { font-weight: 500; font-size: 14px; color: var(--text-1); flex: 1; }
        .suggestion-dist { font-size: 11px; font-weight: 500; color: var(--text-3); font-family: 'DM Mono', monospace; }
        .map-controls { position: fixed; right: 14px; bottom: calc(var(--sheet-peek) + 20px); z-index: 50; display: flex; flex-direction: column; gap: 8px; }
        .ctrl-btn { width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border-hi); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); box-shadow: 0 4px 16px rgba(0,0,0,0.4); transition: all 0.15s; }
        .ctrl-btn:active { background: var(--surface-3); transform: scale(0.96); }
        .ctrl-btn.follow-active { background: var(--accent); border-color: var(--accent); color: #0A0A0C; box-shadow: 0 0 0 3px rgba(200,241,53,0.2); }
        .mode-pill { position: fixed; left: 14px; bottom: calc(var(--sheet-peek) + 20px); z-index: 50; height: 44px; padding: 0 16px; border-radius: var(--radius-full); background: var(--surface); border: 1px solid var(--border-hi); display: flex; align-items: center; gap: 8px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4); transition: all 0.15s; }
        .mode-pill:active { background: var(--surface-3); transform: scale(0.97); }
        .mode-pill .icon { color: var(--accent); }
        .mode-pill-label { font-size: 13px; font-weight: 600; color: var(--text-1); }
        .sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 55; background: var(--surface); border-top: 1px solid var(--border-hi); border-radius: 24px 24px 0 0; transition: transform 0.36s cubic-bezier(0.32, 0.72, 0, 1); }
        .sheet.collapsed { transform: translateY(calc(100% - var(--sheet-peek))); }
        .sheet.expanded { transform: translateY(0); }
        .sheet.inactive { opacity: 0.5; pointer-events: none; transform: translateY(calc(100% - var(--sheet-peek))); }
        .sheet-handle-row { display: flex; justify-content: center; padding: 12px 0 8px; cursor: pointer; }
        .sheet-handle { width: 36px; height: 4px; border-radius: 4px; background: var(--border-hi); }
        .compact-row { display: flex; align-items: center; padding: 0 18px 16px; gap: 12px; cursor: pointer; }
        .sheet.expanded .compact-row { display: none; }
        .compact-dest-text { flex: 1; font-size: 14px; font-weight: 600; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .compact-badge { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--accent); background: var(--accent-dim); padding: 4px 10px; border-radius: var(--radius-full); flex-shrink: 0; }
        .sheet-body { display: none; padding: 0 18px 32px; }
        .sheet.expanded .sheet-body { display: block; }
        .sheet-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; margin-top: 18px; }
        .route-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
        .route-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .route-dot.origin { background: var(--text-2); border: 2px solid var(--text-3); }
        .route-dot.dest { background: var(--accent); }
        .route-card-content { flex: 1; min-width: 0; }
        .route-card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 3px; }
        .route-card-value { font-size: 14px; font-weight: 600; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .metrics-strip { display: flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; margin-top: 8px; }
        .metric-cell { flex: 1; padding: 14px 0; text-align: center; }
        .metric-cell + .metric-cell { border-left: 1px solid var(--border); }
        .metric-val { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--text-1); line-height: 1; }
        .metric-lbl { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-top: 5px; }
        .actions-row { display: flex; gap: 10px; margin-top: 14px; }
        .btn-go { flex: 2; height: 52px; border-radius: var(--radius-full); background: var(--accent); border: none; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; color: #0A0A0C; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: opacity 0.15s; }
        .btn-go:active { opacity: 0.8; }
        .btn-stop { flex: 1; height: 52px; border-radius: var(--radius-full); background: var(--surface-3); border: 1px solid var(--border-hi); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; color: var(--text-2); display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: background 0.15s; }
        .btn-stop:active { background: var(--surface-2); }
        .gps-row { display: flex; align-items: center; justify-content: center; gap: 7px; margin-top: 14px; }
        .gps-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); flex-shrink: 0; transition: background 0.2s; }
        .gps-dot.live { background: var(--safe); animation: pulse 1.8s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
        .gps-label { font-size: 11px; font-weight: 500; color: var(--text-3); font-family: 'DM Mono', monospace; }
        .sheet-top-row { display: flex; align-items: center; justify-content: space-between; padding-bottom: 2px; }
        .sheet-title-text { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-2); }
        .close-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--surface-3); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); transition: background 0.15s; }
        .close-btn:active { background: var(--surface-2); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 70; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 8px 0 calc(env(safe-area-inset-bottom, 0px) + 6px); }
        .sheet.expanded ~ .bottom-nav, body.sheet-open .bottom-nav { opacity: 0; pointer-events: none; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; padding: 4px 0; transition: opacity 0.15s; }
        .nav-tab:active { opacity: 0.7; }
        .nav-tab-icon { color: var(--text-3); transition: color 0.15s; font-size: 20px; }
        .nav-tab-label { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; color: var(--text-3); transition: color 0.15s; }
        .nav-tab.active .nav-tab-icon, .nav-tab.active .nav-tab-label { color: var(--accent); }
        .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--surface-2); }
        ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="top-bar">
        <div class="search-wrap">
            <span class="icon icon-sm search-icon-left">search</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Where to?" autocomplete="off" />
            <span class="search-clear" id="clearSearchBtn"><span class="icon" style="font-size:13px">close</span></span>
            <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
        </div>
    </div>
    
    <div class="mode-pill" id="modeToggle">
        <span class="icon icon-sm" id="modeIcon">directions_walk</span>
        <span class="mode-pill-label" id="modeText">Walk</span>
    </div>
    
    <div class="map-controls">
        <div class="ctrl-btn" id="zoomInBtn"><span class="icon icon-md">add</span></div>
        <div class="ctrl-btn" id="zoomOutBtn"><span class="icon icon-md">remove</span></div>
        <div class="ctrl-btn" id="followMeBtn"><span class="icon icon-md">navigation</span></div>
    </div>
    
    <div class="sheet inactive" id="navSheet">
        <div class="sheet-handle-row" id="handleArea"><div class="sheet-handle"></div></div>
        <div class="compact-row" id="compactInfo">
            <span class="icon icon-sm" id="compactMode" style="color:var(--text-3)">directions_walk</span>
            <span class="compact-dest-text" id="compactDest">Select destination</span>
            <span class="compact-badge" id="compactDistance">—</span>
        </div>
        <div class="sheet-body">
            <div class="sheet-top-row">
                <span class="sheet-title-text" id="sheetModeTitle">Walking route</span>
                <button class="close-btn" id="closeSheetBtn"><span class="icon icon-sm">close</span></button>
            </div>
            <div class="sheet-section-label">Route</div>
            <div class="route-card">
                <div class="route-dot origin"></div>
                <div class="route-card-content">
                    <div class="route-card-label">From</div>
                    <div class="route-card-value" id="departureLabel">Your location</div>
                </div>
            </div>
            <div class="route-card">
                <div class="route-dot dest"></div>
                <div class="route-card-content">
                    <div class="route-card-label">To</div>
                    <div class="route-card-value" id="destinationLabel">Select destination</div>
                </div>
            </div>
            <div class="metrics-strip">
                <div class="metric-cell"><div class="metric-val" id="distanceVal">—</div><div class="metric-lbl">Distance</div></div>
                <div class="metric-cell"><div class="metric-val" id="timeVal">—</div><div class="metric-lbl">Est. time</div></div>
            </div>
            <div class="actions-row">
                <button class="btn-go" id="startNavBtn"><span class="icon icon-sm" id="sheetModeIcon">directions_walk</span>Start</button>
                <button class="btn-stop" id="stopNavBtn"><span class="icon icon-sm">stop</span>Stop</button>
            </div>
            <div class="gps-row">
                <div class="gps-dot" id="gpsLed"></div>
                <span class="gps-label" id="gpsText">Waiting for location…</span>
            </div>
        </div>
    </div>
    
    <div class="bottom-nav" id="bottomNav">
        <button class="nav-tab"><span class="icon nav-tab-icon">explore</span><span class="nav-tab-label">Explore</span></button>
        <button class="nav-tab active" id="navTabBtn"><span class="icon nav-tab-icon">directions</span><span class="nav-tab-label">Navigate</span></button>
        <button class="nav-tab"><span class="icon nav-tab-icon">bookmark_border</span><span class="nav-tab-label">Saved</span></button>
        <button class="nav-tab"><span class="icon nav-tab-icon">person_outline</span><span class="nav-tab-label">Account</span></button>
    </div>

    <script>
        // ========== MAP & NAVIGATION STATE ==========
        let map;
        let currentLocation = null;
        let currentDestination = null;
        let userMarker = null;
        let destMarker = null;
        let watchId = null;
        let isNavigating = false;
        let currentMode = "walk";
        let followMode = false;
        let routeLayer = null;          // SINGLE route layer - always replaced, never stacked
        
        // ========== THROTTLING (prevents route spam) ==========
        let lastRouteFetchTime = 0;
        let lastFetchStartHash = "";
        let lastLocationForRoute = null;
        const ROUTE_REFRESH_MIN_METERS = 12;    // Only refetch if moved >12m
        const ROUTE_REFRESH_MIN_SECONDS = 10;   // Or at least 10 seconds between fetches
        
        // ========== HELPER FUNCTIONS ==========
        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const toRad = Math.PI / 180;
            const φ1 = lat1 * toRad, φ2 = lat2 * toRad;
            const Δφ = (lat2 - lat1) * toRad;
            const Δλ = (lon2 - lon1) * toRad;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        
        // CRITICAL: This COMPLETELY REMOVES the old route before drawing a new one
        function clearRouteLayer() {
            if (routeLayer) {
                map.removeLayer(routeLayer);  // ← OLD ROUTE ERASED
                routeLayer = null;
            }
        }
        
        function updateMetrics(distance) {
            if (!distance && distance !== 0) return;
            const time = currentMode === "walk" ? distance / (1.4 * 60) : distance / (8 * 60);
            const distText = distance < 1000 ? `${Math.round(distance)}m` : `${(distance / 1000).toFixed(1)}km`;
            document.getElementById('distanceVal').innerHTML = distText;
            document.getElementById('timeVal').innerHTML = `${Math.ceil(time)} min`;
            document.getElementById('compactDistance').innerHTML = distText;
        }
        
        // Fetch route with proper clearing - NO STACKING
        async function fetchRoute(force = false) {
            if (!currentLocation || !currentDestination) return;
            
            const now = Date.now();
            const movedSinceLastFetch = lastLocationForRoute ? 
                haversine(currentLocation.lat, currentLocation.lng, lastLocationForRoute.lat, lastLocationForRoute.lng) : 999;
            
            // Throttle: don't spam the server or redraw constantly
            if (!force && movedSinceLastFetch < ROUTE_REFRESH_MIN_METERS && 
                (now - lastRouteFetchTime) < ROUTE_REFRESH_MIN_SECONDS * 1000) {
                return;
            }
            
            const routeHash = `${currentLocation.lat.toFixed(6)},${currentLocation.lng.toFixed(6)}|${currentDestination.lat.toFixed(6)},${currentDestination.lng.toFixed(6)}|${currentMode}`;
            if (!force && lastFetchStartHash === routeHash) return;
            
            lastFetchStartHash = routeHash;
            lastRouteFetchTime = now;
            lastLocationForRoute = { ...currentLocation };
            
            try {
                const url = `/api/route?startLat=${currentLocation.lat}&startLng=${currentLocation.lng}&endLat=${currentDestination.lat}&endLng=${currentDestination.lng}&mode=${currentMode}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data && data.path && data.path.length > 0) {
                    clearRouteLayer();  // ← OLD ROUTE GONE
                    // Draw ONLY the new route
                    routeLayer = L.polyline(data.path, {
                        color: "#C8F135",
                        weight: 5,
                        opacity: 0.95,
                        lineCap: 'round',
                        lineJoin: 'round'
                    }).addTo(map);
                    updateMetrics(data.distance);
                }
            } catch (err) {
                console.warn("Route fetch error:", err);
            }
        }
        
        // ========== DESTINATION MANAGEMENT ==========
        function setDestination(dest) {
            if (destMarker) map.removeLayer(destMarker);
            currentDestination = dest;
            document.getElementById('destinationLabel').innerHTML = dest.name;
            document.getElementById('compactDest').innerHTML = dest.name;
            
            const destIcon = L.divIcon({
                html: `<div style="background:#C8F135; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 4px rgba(200,241,53,0.2); border:2px solid #0A0A0C;"><span class="icon" style="color:#0A0A0C; font-size:16px; font-family:'Material Symbols Outlined'; font-variation-settings:'FILL' 1;">location_on</span></div>`,
                iconSize: [36,36], iconAnchor: [18,18]
            });
            destMarker = L.marker([dest.lat, dest.lng], { icon: destIcon }).addTo(map);
            
            if (currentLocation) fetchRoute(true);
            document.getElementById('navSheet').classList.remove('inactive');
            document.getElementById('navSheet').classList.add('expanded');
        }
        
        function clearDestination() {
            currentDestination = null;
            if (destMarker) { map.removeLayer(destMarker); destMarker = null; }
            clearRouteLayer();  // ← Clean up route when destination cleared
            document.getElementById('destinationLabel').innerHTML = "Select destination";
            document.getElementById('compactDest').innerHTML = "Select destination";
            document.getElementById('distanceVal').innerHTML = "—";
            document.getElementById('timeVal').innerHTML = "—";
            document.getElementById('compactDistance').innerHTML = "—";
            document.getElementById('navSheet').classList.add('inactive');
            isNavigating = false;
            setFollowMode(false);
            lastRouteFetchTime = 0;
            lastLocationForRoute = null;
        }
        
        function startNavigation() {
            if (!currentLocation) return;
            if (!currentDestination) { 
                document.getElementById('navSheet').classList.add('expanded');
                document.getElementById('searchInput').focus(); 
                return;
            }
            isNavigating = true;
            fetchRoute(true);
            map.setView([currentLocation.lat, currentLocation.lng], 18);
            document.getElementById('navSheet').classList.remove('expanded');
            document.getElementById('navSheet').classList.add('collapsed');
        }
        
        function stopNavigation() { 
            isNavigating = false; 
            setFollowMode(false); 
            clearDestination(); 
        }
        
        function setFollowMode(enabled) {
            followMode = enabled;
            const btn = document.getElementById('followMeBtn');
            if (followMode) {
                btn.classList.add('follow-active');
                if (currentLocation) map.setView([currentLocation.lat, currentLocation.lng], map.getZoom());
            } else {
                btn.classList.remove('follow-active');
            }
        }
        
        function toggleFollowMode() { setFollowMode(!followMode); }
        
        // ========== CAMPUS DATA & SEARCH ==========
        const campusBuildings = [
            { lat: -23.8865878, lng: 29.7410106, name: "Maths Building" },
            { lat: -23.8870926, lng: 29.7402418, name: "Digital Innovation Lab" },
            { lat: -23.8878509, lng: 29.7409511, name: "TA Hall" },
            { lat: -23.8874262, lng: 29.7397976, name: "Tiro Hall" },
            { lat: -23.8882049, lng: 29.7402466, name: "School of Law" },
            { lat: -23.8879335, lng: 29.7395395, name: "Library" },
            { lat: -23.8885565, lng: 29.7386208, name: "S Block" },
            { lat: -23.8868692, lng: 29.7376558, name: "SRC Chambers" },
            { lat: -23.8877729, lng: 29.7370029, name: "Tsalas Cafe" },
            { lat: -23.8868133, lng: 29.7363624, name: "Mashobane Res" }
        ];
        
        function getSuggestions(query) {
            if (!query) return [];
            const q = query.toLowerCase();
            return campusBuildings.filter(b => b.name.toLowerCase().includes(q)).map(b => ({
                ...b,
                distance: currentLocation ? haversine(currentLocation.lat, currentLocation.lng, b.lat, b.lng) : null
            }));
        }
        
        function showSuggestions(suggestions) {
            const dropdown = document.getElementById('suggestionsDropdown');
            if (suggestions.length === 0) { dropdown.classList.remove('show'); return; }
            dropdown.innerHTML = suggestions.map(b => `
                <div class="suggestion-item" data-lat="${b.lat}" data-lng="${b.lng}" data-name="${b.name.replace(/'/g, "\\'")}">
                    <div class="sug-dot"></div>
                    <div class="suggestion-name">${b.name}</div>
                    ${b.distance ? `<span class="suggestion-dist">${b.distance < 1000 ? Math.round(b.distance) + 'm' : (b.distance/1000).toFixed(1) + 'km'}</span>` : ''}
                </div>`).join('');
            dropdown.classList.add('show');
            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', () => {
                    setDestination({ lat: parseFloat(item.dataset.lat), lng: parseFloat(item.dataset.lng), name: item.dataset.name });
                    document.getElementById('searchInput').value = item.dataset.name;
                    dropdown.classList.remove('show');
                });
            });
        }
        
        // ========== MAP & GPS INIT ==========
        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-23.88674, 29.73942], 18);
            L.tileLayer('https://mt0.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 19 }).addTo(map);
        }
        
        function startGPS() {
            if (!navigator.geolocation) { 
                document.getElementById('gpsText').innerHTML = "GPS not supported"; 
                return; 
            }
            const led = document.getElementById('gpsLed');
            
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const newLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    const locationChanged = !currentLocation || haversine(currentLocation.lat, currentLocation.lng, newLoc.lat, newLoc.lng) > 1;
                    currentLocation = newLoc;
                    document.getElementById('departureLabel').innerHTML = `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
                    led.classList.add('live');
                    document.getElementById('gpsText').innerHTML = isNavigating ? "Navigation active" : "GPS active";
                    
                    // Update user marker (NO SNAPPING - shows true GPS position)
                    if (userMarker) {
                        userMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
                    } else {
                        const iconHtml = `<div style="background:#C8F135; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 4px rgba(200,241,53,0.3); border:2px solid #0A0A0C;"><span class="icon" style="color:#0A0A0C; font-size:15px; font-family:'Material Symbols Outlined'; font-variation-settings:'FILL' 1;">${currentMode === "walk" ? "directions_walk" : "directions_car"}</span></div>`;
                        userMarker = L.marker([pos.coords.latitude, pos.coords.longitude], {
                            icon: L.divIcon({ html: iconHtml, iconSize: [32,32], iconAnchor: [16,16] })
                        }).addTo(map);
                    }
                    
                    if (followMode && currentLocation) {
                        map.setView([currentLocation.lat, currentLocation.lng], map.getZoom());
                    }
                    
                    // Route logic: only fetch when NOT navigating OR user moved significantly
                    if (currentDestination) {
                        if (!isNavigating) {
                            // Preview mode: update route occasionally
                            fetchRoute(false);
                        } else {
                            // Navigation mode: NO route refetching - just check for arrival
                            const distToDest = haversine(currentLocation.lat, currentLocation.lng, currentDestination.lat, currentDestination.lng);
                            if (distToDest < 20) {
                                isNavigating = false;
                                setFollowMode(false);
                                document.getElementById('gpsText').innerHTML = "Arrived!";
                                if (window.navigator.vibrate) window.navigator.vibrate(200);
                                document.getElementById('navSheet').classList.add('expanded');
                            }
                        }
                    }
                },
                (error) => {
                    led.classList.remove('live');
                    document.getElementById('gpsText').innerHTML = error.code === 1 ? "Location permission denied" : "GPS error";
                },
                { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
            );
        }
        
        // ========== EVENT LISTENERS ==========
        document.getElementById('modeToggle').addEventListener('click', () => {
            currentMode = currentMode === "walk" ? "drive" : "walk";
            const isWalk = currentMode === "walk";
            document.getElementById('modeIcon').innerHTML = isWalk ? 'directions_walk' : 'directions_car';
            document.getElementById('modeText').innerHTML = isWalk ? 'Walk' : 'Drive';
            document.getElementById('sheetModeIcon').innerHTML = isWalk ? 'directions_walk' : 'directions_car';
            document.getElementById('sheetModeTitle').innerHTML = isWalk ? 'Walking route' : 'Driving route';
            document.getElementById('compactMode').innerHTML = `<span class="icon icon-sm">${isWalk ? 'directions_walk' : 'directions_car'}</span>`;
            if (currentLocation && currentDestination) fetchRoute(true);
        });
        
        document.getElementById('zoomInBtn').addEventListener('click', () => map.zoomIn());
        document.getElementById('zoomOutBtn').addEventListener('click', () => map.zoomOut());
        document.getElementById('followMeBtn').addEventListener('click', toggleFollowMode);
        document.getElementById('startNavBtn').addEventListener('click', startNavigation);
        document.getElementById('stopNavBtn').addEventListener('click', stopNavigation);
        
        document.getElementById('navTabBtn').addEventListener('click', () => {
            const s = document.getElementById('navSheet');
            if (!s.classList.contains('inactive')) {
                s.classList.remove('collapsed');
                s.classList.add('expanded');
            }
        });
        
        document.getElementById('handleArea').addEventListener('click', () => {
            const s = document.getElementById('navSheet');
            if (s.classList.contains('inactive')) return;
            if (s.classList.contains('expanded')) {
                s.classList.remove('expanded');
                s.classList.add('collapsed');
            } else {
                s.classList.remove('collapsed');
                s.classList.add('expanded');
            }
        });
        
        document.getElementById('compactInfo').addEventListener('click', () => {
            const s = document.getElementById('navSheet');
            if (!s.classList.contains('inactive')) {
                s.classList.remove('collapsed');
                s.classList.add('expanded');
            }
        });
        
        document.getElementById('closeSheetBtn').addEventListener('click', () => {
            document.getElementById('navSheet').classList.remove('expanded');
            document.getElementById('navSheet').classList.add('collapsed');
        });
        
        // Search functionality
        let searchTimeout;
        const searchInputEl = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearchBtn');
        
        searchInputEl.addEventListener('input', (e) => {
            clearBtn.style.display = e.target.value ? 'flex' : 'none';
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                showSuggestions(getSuggestions(e.target.value.toLowerCase()));
            }, 150);
        });
        
        clearBtn.addEventListener('click', () => {
            searchInputEl.value = '';
            clearBtn.style.display = 'none';
            document.getElementById('suggestionsDropdown').classList.remove('show');
            searchInputEl.focus();
        });
        
        document.addEventListener('click', (e) => {
            if (!searchInputEl.contains(e.target) && !document.getElementById('suggestionsDropdown').contains(e.target)) {
                document.getElementById('suggestionsDropdown').classList.remove('show');
            }
        });
        
        // Initialize
        window.addEventListener('load', () => {
            initMap();
            startGPS();
        });
        
        window.addEventListener('beforeunload', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
        });
    </script>
</body>
</html>
